<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blog Post (Debug)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1000 800'%3E%3Crect width='1000' height='800' fill='%23000000'/%3E%3Cpath d='M145 250 L525 250 C705 250 855 360 855 490 C855 620 705 730 525 730 L345 730 L345 490 L505 490 L505 570 L425 570 L425 650 C575 650 695 580 695 490 C695 400 615 330 525 330 L225 330 Z' fill='%238A8A8A'/%3E%3Cpath d='M225 370 L525 370 L445 450 L305 450 L305 680 L225 760 Z' fill='%238A8A8A'/%3E%3Cpath d='M225 130 L305 210 L225 210 Z' fill='%238A8A8A'/%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@contentful/rich-text-html-renderer@16.3.4/dist/rich-text-html-renderer.min.js"></script>
  <style>
    body { padding: 2rem; font-family: sans-serif; }
    .debug { background: #f0f0f0; padding: 1rem; margin-bottom: 1rem; border-left: 4px solid blue; }
    .rich-text-content { max-width: 800px; margin: 0 auto; }
    /* No hidden overflow */
    .rich-text-content * { max-height: none !important; overflow: visible !important; }
  </style>
</head>
<body>
  <div id="debug" class="debug">Loading...</div>
  <div id="postContent" class="rich-text-content"></div>
  <script>
    const SPACE_ID = 'ha7fm2wzrbnt';
    const ACCESS_TOKEN = 'aHD6agJic7zpquFTSOczZyIjKvYiZk-7A-eEp_5OLZQ';

    async function loadPost() {
      const slug = new URLSearchParams(window.location.search).get('slug');
      if (!slug) {
        document.getElementById('debug').innerHTML = '❌ No slug provided.';
        return;
      }
      const url = `https://cdn.contentful.com/spaces/${SPACE_ID}/environments/master/entries?content_type=blogPost&fields.slug=${slug}&limit=1`;
      try {
        const res = await fetch(url, { headers: { 'Authorization': `Bearer ${ACCESS_TOKEN}` } });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!data.items || data.items.length === 0) throw new Error('Post not found');
        const post = data.items[0];
        const body = post.fields.body;
        let html = '';
        if (body && typeof documentToHtmlString === 'function') {
          html = documentToHtmlString(body);
          document.getElementById('debug').innerHTML = `✅ Rendered HTML length: ${html.length} characters.<br>First 500 chars: <pre>${escapeHtml(html.substring(0, 500))}</pre>`;
        } else {
          html = '<p>Rich text renderer not available.</p>';
          document.getElementById('debug').innerHTML = '❌ documentToHtmlString missing.';
        }
        document.getElementById('postContent').innerHTML = html;
      } catch (err) {
        document.getElementById('debug').innerHTML = `❌ Error: ${err.message}`;
      }
    }
    function escapeHtml(str) {
      return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    loadPost();
  </script>
</body>
</html>
