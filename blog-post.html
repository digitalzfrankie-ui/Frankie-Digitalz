<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Frankie Digitalz – Blog Post</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1000 800'%3E%3Crect width='1000' height='800' fill='%23000000'/%3E%3Cpath d='M145 250 L525 250 C705 250 855 360 855 490 C855 620 705 730 525 730 L345 730 L345 490 L505 490 L505 570 L425 570 L425 650 C575 650 695 580 695 490 C695 400 615 330 525 330 L225 330 Z' fill='%238A8A8A'/%3E%3Cpath d='M225 370 L525 370 L445 450 L305 450 L305 680 L225 760 Z' fill='%238A8A8A'/%3E%3Cpath d='M225 130 L305 210 L225 210 Z' fill='%238A8A8A'/%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@contentful/rich-text-html-renderer@16.3.4/dist/rich-text-html-renderer.min.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: white; padding: 2rem 1rem; }
    .rich-text-content { max-width: 800px; margin: 0 auto; line-height: 1.7; color: #1f2937; }
    .rich-text-content h2 { font-size: 1.8rem; font-weight: 700; margin: 1.5em 0 0.5em; }
    .rich-text-content h3 { font-size: 1.4rem; font-weight: 600; margin: 1.2em 0 0.5em; }
    .rich-text-content p { margin-bottom: 1rem; }
    .rich-text-content ul, .rich-text-content ol { 
      margin: 1rem 0; 
      padding-left: 1.5rem; 
    }
    .rich-text-content ul {
      list-style-type: disc !important;
    }
    .rich-text-content ol {
      list-style-type: decimal !important;
    }
    .rich-text-content li {
      display: list-item !important;
      margin-bottom: 0.5rem;
    }
    .rich-text-content img { max-width: 100%; border-radius: 0.5rem; margin: 1rem 0; }
    .rich-text-content a { color: #007BFF; text-decoration: underline; }
    /* Remove any hidden overflow */
    * { max-height: none !important; overflow: visible !important; }
    .debug-info { background: #f3f4f6; padding: 0.5rem 1rem; margin-bottom: 1rem; border-radius: 8px; font-size: 0.875rem; color: #374151; text-align: center; }
  </style>
  <script>
    // Fallback in case the CDN fails
    if (typeof documentToHtmlString !== 'function') {
      window.documentToHtmlString = function(richText) {
        console.warn('Using fallback renderer');
        if (!richText || !richText.content) return '<p>Content could not be rendered.</p>';
        let html = '';
        function walk(node) {
          if (node.nodeType === 'text') {
            html += node.value || '';
          } else if (node.nodeType === 'paragraph') {
            html += '<p>';
            if (node.content) node.content.forEach(walk);
            html += '</p>';
          } else if (node.nodeType === 'heading-2') {
            html += '<h2>';
            if (node.content) node.content.forEach(walk);
            html += '</h2>';
          } else if (node.nodeType === 'heading-3') {
            html += '<h3>';
            if (node.content) node.content.forEach(walk);
            html += '</h3>';
          } else if (node.nodeType === 'unordered-list') {
            html += '<ul class="list-disc">';
            if (node.content) node.content.forEach(walk);
            html += '</ul>';
          } else if (node.nodeType === 'ordered-list') {
            html += '<ol class="list-decimal">';
            if (node.content) node.content.forEach(walk);
            html += '</ol>';
          } else if (node.nodeType === 'list-item') {
            html += '<li>';
            if (node.content) node.content.forEach(walk);
            html += '</li>';
          } else if (node.nodeType === 'hyperlink') {
            const uri = node.data?.uri || '#';
            html += `<a href="${uri}">`;
            if (node.content) node.content.forEach(walk);
            html += '</a>';
          } else {
            if (node.content) node.content.forEach(walk);
          }
        }
        walk(richText);
        return html;
      };
    }
  </script>
</head>
<body>
  <div id="debug" class="debug-info">Loading post...</div>
  <div id="postContent" class="rich-text-content"></div>
  <script>
    const SPACE_ID = 'ha7fm2wzrbnt';
    const ACCESS_TOKEN = 'aHD6agJic7zpquFTSOczZyIjKvYiZk-7A-eEp_5OLZQ';
    const debugDiv = document.getElementById('debug');
    const contentDiv = document.getElementById('postContent');

    async function loadPost() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');
      if (!slug) {
        debugDiv.innerHTML = '❌ No article specified.';
        contentDiv.innerHTML = '<p><a href="blog.html">← Back to blog</a></p>';
        return;
      }
      const url = `https://cdn.contentful.com/spaces/${SPACE_ID}/environments/master/entries?content_type=blogPost&fields.slug=${slug}&limit=1`;
      try {
        const response = await fetch(url, {
          headers: { 'Authorization': `Bearer ${ACCESS_TOKEN}` }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        if (!data.items || data.items.length === 0) throw new Error('Post not found');
        const post = data.items[0];
        const fields = post.fields;
        const imageAsset = data.includes?.Asset?.find(a => a.sys.id === fields.featuredImage?.sys?.id);
        const imageUrl = imageAsset ? `https:${imageAsset.fields.file.url}` : null;
        let bodyHtml = '';
        if (fields.body) {
          try {
            bodyHtml = documentToHtmlString(fields.body);
          } catch (e) {
            bodyHtml = '<p>Error rendering content. Please try again later.</p>';
            debugDiv.innerHTML += `<br>⚠️ Render error: ${e.message}`;
          }
        } else {
          bodyHtml = `<p>${escapeHtml(fields.excerpt || 'No content available.')}</p>`;
        }
        const dateHtml = fields.publishDate ? `<div class="text-gray-500 text-sm mb-4">${new Date(fields.publishDate).toLocaleDateString()}</div>` : '';
        const imageHtml = imageUrl ? `<div class="mb-6"><img src="${imageUrl}" alt="${escapeHtml(fields.title)}" class="rounded-xl shadow"></div>` : '';
        const fullHtml = `
          <h1 class="text-3xl md:text-4xl font-bold mb-2">${escapeHtml(fields.title)}</h1>
          ${dateHtml}
          ${imageHtml}
          <div>${bodyHtml}</div>
          <div class="mt-12 pt-6 border-t text-center"><a href="blog.html" class="text-blue-600 hover:underline">← Back to all articles</a></div>
        `;
        contentDiv.innerHTML = fullHtml;
        debugDiv.innerHTML = `✅ Rendered ${bodyHtml.length} characters of HTML content.`;
      } catch (err) {
        debugDiv.innerHTML = `❌ Error: ${err.message}`;
        contentDiv.innerHTML = '<p><a href="blog.html">← Back to blog</a></p>';
      }
    }
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    loadPost();
  </script>
</body>
</html>
