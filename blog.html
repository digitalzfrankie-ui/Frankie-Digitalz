<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Frankie Digitalz – Blog</title>
  <meta name="description" content="Read the latest insights from Frankie Digitalz.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1000 800'%3E%3Crect width='1000' height='800' fill='%23000000'/%3E%3Cpath d='M145 250 L525 250 C705 250 855 360 855 490 C855 620 705 730 525 730 L345 730 L345 490 L505 490 L505 570 L425 570 L425 650 C575 650 695 580 695 490 C695 400 615 330 525 330 L225 330 Z' fill='%238A8A8A'/%3E%3Cpath d='M225 370 L525 370 L445 450 L305 450 L305 680 L225 760 Z' fill='%238A8A8A'/%3E%3Cpath d='M225 130 L305 210 L225 210 Z' fill='%238A8A8A'/%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f9fafb; }
    .error-box { background: #fee2e2; border-left: 4px solid #dc2626; padding: 1rem; margin: 1rem 0; border-radius: 8px; }
    .info-box { background: #dbeafe; border-left: 4px solid #3b82f6; padding: 1rem; margin: 1rem 0; border-radius: 8px; }
  </style>
</head>
<body class="bg-gray-50">
  <!-- Navbar (simplified, keep your original) -->
  <nav class="bg-black/95 text-white py-3 px-4 fixed top-0 w-full z-50">
    <div class="container mx-auto flex justify-between">
      <span class="font-bold text-xl">FRANKIE DIGITALZ</span>
      <div class="space-x-4"><a href="index.html" class="hover:text-gray-300">Home</a><a href="blog.html" class="hover:text-gray-300">Blog</a></div>
    </div>
  </nav>
  <main class="pt-24 pb-12 px-4 max-w-6xl mx-auto">
    <h1 class="text-4xl font-bold text-center mb-12">Our Blog</h1>
    <div id="debug" class="mb-6"></div>
    <div id="blogGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
  </main>
  <script>
    const SPACE_ID = 'ha7fm2wzrbnt';
    const ACCESS_TOKEN = 'aHD6agJic7zpquFTSOczZyIjKvYiZk-7A-eEp_5OLZQ';
    const debugDiv = document.getElementById('debug');
    const gridDiv = document.getElementById('blogGrid');
    function showMsg(type, text) {
      const div = document.createElement('div');
      div.className = type === 'error' ? 'error-box' : 'info-box';
      div.innerHTML = text;
      debugDiv.appendChild(div);
    }
    async function fetchPosts() {
      const url = `https://cdn.contentful.com/spaces/${SPACE_ID}/environments/master/entries?content_type=blogPost&order=-fields.publishDate`;
      showMsg('info', `Requesting: ${url}`);
      try {
        const res = await fetch(url, { headers: { 'Authorization': `Bearer ${ACCESS_TOKEN}` } });
        if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
        const data = await res.json();
        const items = data.items || [];
        if (items.length === 0) {
          showMsg('error', 'No blog posts found. Make sure you have published entries of type "blogPost".');
          gridDiv.innerHTML = '<div class="col-span-full text-center text-gray-500">No blog posts yet.</div>';
          return;
        }
        showMsg('info', `✅ Found ${items.length} blog post(s).`);
        // Helper to get image URL
        const getImage = (id) => {
          const asset = data.includes?.Asset?.find(a => a.sys.id === id);
          return asset ? `https:${asset.fields.file.url}` : null;
        };
        gridDiv.innerHTML = items.map(post => {
          const f = post.fields;
          const imgUrl = f.featuredImage ? getImage(f.featuredImage.sys.id) : null;
          return `
            <div class="bg-white rounded-xl shadow overflow-hidden">
              ${imgUrl ? `<img src="${imgUrl}" class="w-full h-48 object-cover">` : '<div class="h-48 bg-gray-200 flex items-center justify-center text-gray-400">No image</div>'}
              <div class="p-5">
                <h2 class="text-xl font-bold mb-2">${escapeHtml(f.title)}</h2>
                <p class="text-gray-500 text-sm mb-3">${f.publishDate ? new Date(f.publishDate).toLocaleDateString() : ''}</p>
                <p class="text-gray-600 mb-4">${escapeHtml((f.excerpt || '').substring(0, 120))}...</p>
                <a href="blog-post.html?slug=${encodeURIComponent(f.slug)}" class="inline-block bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Read More →</a>
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        showMsg('error', `Error: ${err.message}`);
        gridDiv.innerHTML = '<div class="col-span-full text-center text-red-600">Failed to load blog. Please check console.</div>';
      }
    }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    fetchPosts();
  </script>
</body>
</html>
